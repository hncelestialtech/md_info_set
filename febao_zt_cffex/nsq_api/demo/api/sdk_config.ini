[nsq_api]
console_output_log=1                     ;是否在控台输出日志信息。0表示不输出，1表示输出。默认为1。

support_markets=sh,sz                    ;支持的市场类别。以逗号分隔，和下面市场key对应,目前支持sh、sz、shfe、dce、czce、cffex、ine、neeq、bj
                                         ;shfe上期所, dce大商所, czce郑商所, cffex中金所, ine能源, neeq股转, bj北交所


;用户登录、接收代码表等信息的tcp通道
service_addr=192.168.1.168               ;行情周边服务侦听TCP服务地址, 行情周边服务指sailfish_service
service_port=8888                        ;行情周边服务侦听TCP服务端口

;用户登录、接收代码表等信息的tcp冷备通道
service_addr1=192.168.1.169              ;行情周边服务侦听TCP服务冷备地址, 行情周边服务指sailfish_service
service_port1=8888                       ;行情周边服务侦听TCP服务冷备端口

;开户绑定mac地址对应网卡配置，用户登录行情服务校验使用
auth_interface_ip=192.168.1.189          ;获取该ip对应的网卡mac地址，用于权限服务系统校验

rebuild_timeout=5						 ;重建请求超时时间，单位：秒，默认5秒

;是否在日志中输出回调耗时统计信息，默认值0不输出到日志中
time_statistics=0                        ;回调耗时统计信息输出到日志，默认不开启。0-关闭；1-开启

;是否开启回调接口耗时统计功能，默认值1开启
cb_stat_enable=1                         ;回调耗时统计功能开启，默认开启。1-开启，0-关闭

;是否接受组播数据时使用efvi接口(仅linux_x64版本支持；使用后，组播行情接收将使用solarflare网卡efvi模式)
efvi_interface=0                         ;使用efvi接口。0-不使用 1-使用; 使用EFVI功能依赖librcm.so，请确保运行目录下有该文件

;rcm配置文件路径
rcm_template_cfg_path="rcm_template.json"


[sh]
session_num=1                            ;开启session数量
timeout=20                               ;超时时间20秒,至少大于网关超时时间两倍以上

;逐笔重建服务地址1
;rebuild_addr=10.20.33.2
;rebuild_port=39127
;逐笔重建服务地址2                       ;支持双路rebuild同时接入，用户请求重建，只要任何一路有重建请求需要的数据，可完成数据补全
;rebuild_addr1=10.20.33.2
;rebuild_port1=39128

sniff_fast_unified_tick_enable=1         ;嗅探接收sh fast数据时，合并逐笔解析开关: 0-表示不生效(解析非合并逐笔)，1-表示生效(解析合并逐笔)

[sh_session1]
recv_buf_size=128                        ;接收组播行情的UDP缓存大小，单位M
session_cpu_affinity=5                   ;通道所属线程绑定到的cpu列表，以0开始，配置多个cpu时,支持5,6,7或者5-7配置方式
                                         ;sh_session1_rpc_hot地址列表只启用一个地址，可只配置一个cpu
                                         ;sh_session1_rpc_hot地址列表启用N个地址时，需配置N+1个cpu
										 ;该session启用可靠组播地址时，需要多配置几个cpu(一个地址一个cpu)给可靠组播绑核接收数据(可选)
enable_tick_combine=1                    ;热备模式下，是否开启逐笔保全功能，0-逐笔择优；1-逐笔保全	
						
;nsq行情主地址列表, 多路同时接收数据
[sh_session1_rpc_hot]
;接收NSQ组播行情主地址
mcast_enable=1                           ;地址开关控制配置。0-表示不生效，1-表示地址生效
mcast_interface_addr=192.168.1.189       ;接收组播行情的本机网卡IP
mcast_addr=225.0.0.188                   ;接收行情的组播ip，主地址
mcast_port=17888                         ;接收行情的组播端口
;mcast_source_type=0                     ;接收到的组播行情数据类型。FPGA行情配置为3, 0(默认)其他

;接收可靠组播配置
rcm_mcast_enable=0                       ;地址开关控制配置。0-表示不生效，1-表示地址生效
rcm_mcast_interface_addr=192.168.1.189   ;接收可靠组播行情的本机网卡IP
rcm_mcast_addr=225.10.0.101              ;接收行情的可靠组播ip，主地址
rcm_mcast_port=10010                     ;可靠组播端口
rcm_mcast_id=39                          ;可靠组播主题id，需要与sailfish端一致

;FPGA本地版接入配置,仅支持linux64位系统, 仅支持配置一个DMA本地配置, 依赖库libupdma.so
fpga_dma_enable=0                        ;地址开关控制配置。0-表示不生效，1-表示地址生效
fpga_dma_cpu_affinity=2                  ;配置使用独立接收线程的CPU绑定, 表示启用独立线程并配置核心绑定, 单SDK模式

;嗅探地址配置 
sniffer_enable=0                         ;地址开关控制配置。0-表示不生效，1-表示地址生效
sniffer_interface_addr=1.1.1.4           ;嗅探网卡ip地址
sniffer_src_addr=1.1.1.1                 ;镜像数据源地址
sniffer_src_port=5129                    ;镜像数据源端口
sniffer_dst_addr=1.1.1.2                 ;镜像数据源目标地址

;接收NSQ L2Plus 组播行情配置
mcast_enable_plus=0                      ;地址开关控制配置。0-表示不生效，1-表示地址生效
mcast_interface_addr_plus=192.168.1.189  ;接收快照Plus组播行情的本机网卡IP
mcast_addr_plus=225.0.3.110              ;接收快照Plus组播行情的组播IP，主地址
mcast_port_plus=17888                    ;接收行情的组播端口

;接收接收NSQ L2Plus 可靠组播配置
rcm_mcast_enable_plus=0                       ;地址开关控制配置。0-表示不生效，1-表示地址生效
rcm_mcast_interface_addr_plus=192.168.1.189   ;接收可靠组播行情的本机网卡IP
rcm_mcast_addr_plus=225.0.1.178               ;接收行情的可靠组播ip，主地址
rcm_mcast_port_plus=10186                     ;可靠组播端口
rcm_mcast_id_plus=12                          ;可靠组播主题id，需要与L2Plus端一致

;nsq行情温备地址列表
[sh_session1_rpc_warm]
;接收NSQ组播行情温备地址
mcast_enable=1                           ;地址开关控制配置。0-表示不生效，1-表示地址生效
mcast_interface_addr=192.168.1.189       ;接收组播行情的本机网卡IP
mcast_addr=225.0.0.187                   ;接收行情的组播ip，主地址
mcast_port=17887                         ;接收行情的组播端口
mcast_priority=0                         ;地址优先级。取值0~9，数值大优先级低
;mcast_source_type=0                     ;接收到的组播行情数据类型。FPGA行情配置为3, 0(默认)其他

;接收可靠组播配置
rcm_mcast_enable=0                       ;地址开关控制配置。0-表示不生效，1-表示地址生效
rcm_mcast_interface_addr=192.168.1.189   ;接收可靠组播行情的本机网卡IP
rcm_mcast_addr=225.10.0.102              ;接收行情的可靠组播ip，主地址
rcm_mcast_port=10011                     ;可靠组播端口
rcm_mcast_id=40                          ;可靠组播主题id，需要与sailfish端一致
rcm_mcast_priority=2                     ;地址优先级，数值越大优先级越低

;接收NSQ TCP行情主地址（互联网测试使用）
server_enable=0                          ;地址开关控制配置。0-表示不生效，1-表示地址生效
server_addr=192.168.1.168                ;接收tcp行情的服务端ip，主地址
server_port=17887                        ;接收tcp行情的服务端端口
server_priority=0                        ;地址优先级。取值0~9，数值大优先级低
server_source_type=1                     ;上级源类型，1-sailfish, 4-DS, 5-HQReceiverGW; 默认为1-sailfish

;接收NSQ L2Plus TCP行情配置（互联网测试使用）
server_enable_plus=0                     ;地址开关控制配置。0-表示不生效，1-表示地址生效
server_addr_plus=192.168.1.168           ;接收L2Plus tcp行情的服务端ip，主地址
server_port_plus=17888                   ;接收L2Plus tcp行情的服务端端口

;nsq行情冷备地址列表，注意level1地址只能配置在冷备地址列表
