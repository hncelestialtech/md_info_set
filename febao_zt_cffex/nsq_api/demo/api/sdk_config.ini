mcast_addr=225.0.0.186                   ;接收行情的组播ip，主地址
mcast_port=17886                         ;接收行情的组播端口
mcast_priority=0                         ;地址优先级。取值0~9，数值大优先级低
;mcast_source_type=0                     ;接收到的组播行情数据类型。FPGA行情配置为3, 0(默认)其他

;接收可靠组播配置
rcm_mcast_enable=0                       ;地址开关控制配置。0-表示不生效，1-表示地址生效
rcm_mcast_interface_addr=192.168.1.189   ;接收可靠组播行情的本机网卡IP
rcm_mcast_addr=225.10.0.103              ;接收行情的可靠组播ip，主地址
